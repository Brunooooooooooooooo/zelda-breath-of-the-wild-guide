<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="pltSky" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#87ceeb"/><stop offset="60%" stop-color="#c5ddf2"/><stop offset="100%" stop-color="#5a8a3a"/></linearGradient>
  </defs>
  <rect fill="url(#pltSky)" width="800" height="400"/>
  <!-- 太阳 -->
  <circle cx="600" cy="80" r="30" fill="#fff8e1" opacity="0.9"/>
  <!-- 初始台地山崖 -->
  <polygon points="0,250 50,220 120,250 200,200 300,260 400,210 500,260 600,220 700,250 800,200 800,400 0,400" fill="#8B7355"/>
  <polygon points="0,280 100,260 200,290 300,250 400,280 500,260 600,290 700,250 800,280 800,400 0,400" fill="#a0522d"/>
  <!-- 草地 -->
  <rect y="320" width="800" height="80" fill="#4a7c3f"/>
  <!-- 复苏神庙 -->
  <g transform="translate(300,240)">
    <rect x="0" y="0" width="120" height="60" rx="10" fill="#6a7a8a"/>
    <path d="M-10,0 Q60,-30 130,0" fill="#7a8a9a"/>
    <rect x="50" y="15" width="20" height="45" rx="3" fill="#3a4a5a"/>
  </g>
  <!-- 树 -->
  <g transform="translate(600,240)">
    <rect x="-4" y="0" width="8" height="40" fill="#5a3a1a"/>
    <circle cx="0" cy="-10" r="25" fill="#3a6020"/>
  </g>
  <!-- 老人 -->
  <g transform="translate(180,280)" opacity="0.7">
    <circle cx="0" cy="-8" r="5" fill="#e8d0a0"/>
    <rect x="-3" y="-3" width="6" height="15" fill="#8B4513"/>
    <rect x="-5" y="12" width="3" height="8" fill="#5a3a1a"/>
    <rect x="2" y="12" width="3" height="8" fill="#5a3a1a"/>
  </g>
  <text x="400" y="370" text-anchor="middle" fill="#1a1a1a" font-size="14" opacity="0.4">G R E A T   P L A T E A U</text>
</svg>
