<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="dragonBg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1a1025"/><stop offset="100%" stop-color="#0a0515"/></linearGradient>
    <radialGradient id="dragonGlow"><stop offset="0%" stop-color="#4fc3f7" stop-opacity="0.2"/><stop offset="100%" stop-color="transparent"/></radialGradient>
  </defs>
  <rect fill="url(#dragonBg)" width="800" height="400"/>
  <circle cx="400" cy="180" r="200" fill="url(#dragonGlow)"/>
  <!-- 龙（简化轮廓） -->
  <g transform="translate(200,150)" fill="none" stroke="#4fc3f7" stroke-width="2" opacity="0.6">
    <path d="M0,50 Q50,0 150,20 Q250,40 400,10 Q500,-20 550,0"/>
    <path d="M0,50 Q40,70 130,60 Q230,50 350,45 Q450,40 550,0"/>
    <!-- 角 -->
    <path d="M0,50 Q-20,20 -30,10" stroke-width="1.5"/>
    <path d="M10,45 Q5,25 -5,15" stroke-width="1.5"/>
  </g>
  <!-- 闪电粒子 -->
  <g fill="#4fc3f7" opacity="0.4">
    <circle cx="300" cy="100" r="3"><animate attributeName="opacity" values="0.2;0.6;0.2" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="450" cy="80" r="2"><animate attributeName="opacity" values="0.1;0.5;0.1" dur="2.5s" repeatCount="indefinite"/></circle>
    <circle cx="350" cy="140" r="2.5"><animate attributeName="opacity" values="0.3;0.7;0.3" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="500" cy="120" r="2"><animate attributeName="opacity" values="0.1;0.4;0.1" dur="3.5s" repeatCount="indefinite"/></circle>
  </g>
  <text x="400" y="350" text-anchor="middle" fill="#4fc3f7" font-size="14" opacity="0.3">S E C R E T S</text>
</svg>
