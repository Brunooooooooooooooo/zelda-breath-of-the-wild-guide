<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0a0e2a"/><stop offset="60%" stop-color="#111d40"/><stop offset="100%" stop-color="#1a0a20"/></linearGradient>
    <radialGradient id="dragonAura"><stop offset="0%" stop-color="#4fc3f7" stop-opacity="0.25"/><stop offset="100%" stop-color="transparent"/></radialGradient>
    <filter id="dragonGlow"><feGaussianBlur stdDeviation="3"/></filter>
  </defs>
  <rect fill="url(#sky)" width="800" height="400"/>
  <!-- 月亮 -->
  <circle cx="650" cy="70" r="35" fill="#e8f0f8" opacity="0.6"/>
  <!-- 星星 -->
  <g fill="white" opacity="0.4">
    <circle cx="100" cy="50" r="2"/><circle cx="200" cy="80" r="1.5"/>
    <circle cx="350" cy="40" r="2"/><circle cx="500" cy="60" r="1.5"/>
    <circle cx="720" cy="120" r="2"/><circle cx="150" cy="130" r="1"/>
    <circle cx="450" cy="100" r="1"/><circle cx="580" cy="45" r="1.5"/>
  </g>
  <!-- 龙之光辉 -->
  <circle cx="400" cy="180" r="220" fill="url(#dragonAura)"/>
  <!-- 龙（费罗龙/雷龙） -->
  <g transform="translate(400,180)" filter="url(#dragonGlow)">
    <!-- 龙身（S形弯曲） -->
    <path d="M-200,30 Q-150,-10 -80,20 Q-20,50 30,10 Q80,-30 140,0 Q180,20 200,10" fill="none" stroke="#4fc3f7" stroke-width="6" opacity="0.7"/>
    <path d="M-200,30 Q-150,-10 -80,20 Q-20,50 30,10 Q80,-30 140,0 Q180,20 200,10" fill="none" stroke="#e8f0f8" stroke-width="2" opacity="0.9"/>
    <!-- 头部 -->
    <g transform="translate(-200,30)">
      <ellipse cx="-15" cy="-5" rx="20" ry="12" fill="#4fc3f7" opacity="0.5"/>
      <!-- 角 -->
      <path d="M-25,-12 Q-35,-30 -40,-35" fill="none" stroke="#4fc3f7" stroke-width="2.5"/>
      <path d="M-18,-15 Q-22,-30 -28,-32" fill="none" stroke="#4fc3f7" stroke-width="2"/>
      <!-- 眼 -->
      <circle cx="-28" cy="-5" r="3" fill="#e8f0f8"/>
      <!-- 角 -->
      <path d="M-30,10 Q-45,15 -50,10" fill="none" stroke="#4fc3f7" stroke-width="2"/>
    </g>
    <!-- 尾部 -->
    <g transform="translate(200,10)">
      <path d="M0,0 Q20,-15 25,-5 Q30,5 20,15" fill="none" stroke="#4fc3f7" stroke-width="3" opacity="0.6"/>
    </g>
  </g>
  <!-- 闪电粒子 -->
  <g fill="#4fc3f7" opacity="0.6">
    <circle cx="300" cy="130" r="3"><animate attributeName="opacity" values="0.1;0.7;0.1" dur="2s" repeatCount="indefinite"/></circle>
    <circle cx="480" cy="150" r="2.5"><animate attributeName="opacity" values="0.5;0.1;0.5" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="350" cy="200" r="2"><animate attributeName="opacity" values="0.2;0.6;0.2" dur="2.5s" repeatCount="indefinite"/></circle>
    <circle cx="520" cy="120" r="3"><animate attributeName="opacity" values="0.3;0.1;0.3" dur="3.5s" repeatCount="indefinite"/></circle>
  </g>
  <!-- 地面 -->
  <path d="M0,310 Q150,280 300,320 Q450,350 600,300 Q700,280 800,320 L800,400 L0,400 Z" fill="#0a0515" opacity="0.7"/>
  <text x="400" y="375" text-anchor="middle" fill="#4fc3f7" font-size="14" font-family="sans-serif" opacity="0.2">D R A G O N   S E C R E T S</text>
</svg>
