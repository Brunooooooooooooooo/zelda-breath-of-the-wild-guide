<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="towerSky" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0a0e17"/><stop offset="80%" stop-color="#0d1528"/><stop offset="100%" stop-color="#1a2a3e"/></linearGradient>
    <radialGradient id="towerGlow"><stop offset="0%" stop-color="#4fc3f7" stop-opacity="0.6"/><stop offset="100%" stop-color="#4fc3f7" stop-opacity="0"/></radialGradient>
  </defs>
  <rect fill="url(#towerSky)" width="800" height="400"/>
  <!-- 星星 -->
  <g fill="white" opacity="0.3">
    <circle cx="100" cy="50" r="1.5"/><circle cx="250" cy="80" r="1"/><circle cx="500" cy="40" r="1.5"/>
    <circle cx="650" cy="60" r="1"/><circle cx="700" cy="120" r="1.5"/><circle cx="150" cy="130" r="1"/>
  </g>
  <!-- 塔光 -->
  <circle cx="400" cy="180" r="200" fill="url(#towerGlow)"/>
  <!-- 希卡塔 -->
  <g transform="translate(400,200)">
    <!-- 塔身 -->
    <polygon points="-30,80 30,80 20,-80 -20,-80" fill="#2a3a4a" stroke="#4fc3f7" stroke-width="1.5"/>
    <!-- 塔顶 -->
    <ellipse cx="0" cy="-80" rx="25" ry="8" fill="#3a4a5a" stroke="#4fc3f7" stroke-width="1"/>
    <!-- 发光核心 -->
    <circle cx="0" cy="-80" r="12" fill="#4fc3f7" opacity="0.8"/>
    <circle cx="0" cy="-80" r="6" fill="#e8f0f8"/>
    <!-- 塔层 -->
    <line x1="-25" y1="0" x2="25" y2="0" stroke="#4fc3f7" stroke-width="1" opacity="0.3"/>
    <line x1="-22" y1="-40" x2="22" y2="-40" stroke="#4fc3f7" stroke-width="1" opacity="0.3"/>
    <!-- 根/底座 -->
    <path d="M-30,80 Q-50,100 -60,70 M30,80 Q50,100 60,70" fill="none" stroke="#2a3a4a" stroke-width="4"/>
  </g>
  <!-- 扫描线效果 -->
  <g transform="translate(400,200)" stroke="#4fc3f7" stroke-width="0.5" opacity="0.15">
    <line x1="-120" y1="-120" x2="-70" y2="-120"/>
    <line x1="70" y1="-120" x2="120" y2="-120"/>
    <line x1="-60" y1="100" x2="-20" y2="100"/>
    <line x1="20" y1="100" x2="60" y2="100"/>
  </g>
  <text x="400" y="360" text-anchor="middle" fill="#4fc3f7" font-size="14" opacity="0.4">S H E I K A H   T O W E R</text>
</svg>
