<!-- 海拉鲁全景横幅 - 蓝天绿地城堡山 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a90d9"/>
      <stop offset="40%" stop-color="#87ceeb"/>
      <stop offset="70%" stop-color="#b8dff0"/>
      <stop offset="100%" stop-color="#e8f4f8"/>
    </linearGradient>
    <linearGradient id="sun" cx="0.5" cy="0.5" r="0.5" fx="0.5" fy="0.5">
      <stop offset="0%" stop-color="#fff8e1" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#fff8e1" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- 天空 -->
  <rect width="1200" height="400" fill="url(#sky)"/>
  <!-- 太阳光晕 -->
  <circle cx="950" cy="80" r="120" fill="url(#sun)"/>
  <circle cx="950" cy="80" r="40" fill="#fffbe6" opacity="0.6"/>
  <!-- 云 -->
  <g opacity="0.8">
    <ellipse cx="200" cy="100" rx="80" ry="25" fill="white"/>
    <ellipse cx="250" cy="110" rx="60" ry="20" fill="white"/>
    <ellipse cx="170" cy="110" rx="50" ry="18" fill="white" opacity="0.7"/>
    <ellipse cx="600" cy="70" rx="70" ry="22" fill="white"/>
    <ellipse cx="660" cy="80" rx="55" ry="18" fill="white" opacity="0.7"/>
    <ellipse cx="800" cy="140" rx="90" ry="28" fill="white" opacity="0.5"/>
  </g>
  <!-- 远山 -->
  <polygon points="0,280 80,180 160,250 240,170 320,230 400,160 500,250 580,190 700,280" fill="#8fa4b8"/>
  <polygon points="500,250 580,190 700,280 780,200 880,240 950,180 1050,260 1150,190 1200,240 1200,300 500,300" fill="#7a8f9e"/>
  <!-- 海拉鲁城堡 -->
  <g transform="translate(600,120)">
    <!-- 城堡主体 -->
    <rect x="0" y="20" width="80" height="60" fill="#6a7a8a"/>
    <rect x="25" y="-20" width="30" height="40" fill="#7a8a9a"/>
    <!-- 尖塔 -->
    <polygon points="25,-20 40,-60 55,-20" fill="#8a9aaa"/>
    <polygon points="10,20 15,-10 20,20" fill="#708090"/>
    <polygon points="60,20 65,-10 70,20" fill="#708090"/>
    <!-- 城堡旗帜 -->
    <rect x="37" y="-60" width="6" height="15" fill="#5a3a1a"/>
    <polygon points="43,-58 43,-48 55,-53" fill="#c9a84c"/>
    <!-- 城墙 -->
    <rect x="-10" y="50" width="100" height="30" fill="#6a7a8a"/>
    <rect x="-15" y="55" width="10" height="25" fill="#5a6a7a"/>
    <rect x="85" y="55" width="10" height="25" fill="#5a6a7a"/>
  </g>
  <!-- Death Mountain (火山) -->
  <g transform="translate(150,150)">
    <polygon points="30,-40 -30,15 90,15" fill="#8b4513"/>
    <polygon points="30,-30 -10,15 70,15" fill="#a0522d"/>
    <polygon points="30,-15 10,15 50,15" fill="#cd853f" opacity="0.5"/>
    <!-- 火山烟雾 -->
    <ellipse cx="30" cy="-45" rx="15" ry="8" fill="#c0c0c0" opacity="0.3"/>
  </g>
  <!-- 丘陵 -->
  <path d="M0,300 Q100,260 200,290 Q300,250 400,280 Q500,240 600,280 Q700,250 800,280 Q900,240 1000,270 Q1100,250 1200,280 L1200,400 L0,400 Z" fill="#5a8a3a"/>
  <path d="M0,320 Q150,280 300,310 Q450,270 600,300 Q750,280 900,310 Q1050,270 1200,300 L1200,400 L0,400 Z" fill="#4a7020"/>
  <!-- 细节树 -->
  <g fill="#3a5010" opacity="0.6">
    <circle cx="100" cy="270" r="8"/><rect x="98" y="278" width="4" height="8" fill="#4a3020"/>
    <circle cx="350" cy="260" r="10"/><rect x="348" y="270" width="4" height="10" fill="#4a3020"/>
    <circle cx="750" cy="275" r="7"/><rect x="748" y="282" width="4" height="7" fill="#4a3020"/>
    <circle cx="900" cy="255" r="9"/><rect x="898" y="264" width="4" height="10" fill="#4a3020"/>
    <circle cx="1050" cy="265" r="8"/><rect x="1048" y="273" width="4" height="8" fill="#4a3020"/>
    <circle cx="480" cy="268" r="6"/><rect x="478" y="274" width="3" height="6" fill="#4a3020"/>
  </g>
  <!-- 前景草地 -->
  <path d="M0,340 Q200,320 400,335 Q600,315 800,330 Q1000,320 1200,335 L1200,400 L0,400 Z" fill="#3a6020"/>
  <!-- 金色标题背景 -->
  <rect x="0" y="0" width="1200" height="400" fill="rgba(10,14,23,0.3)"/>
</svg>
