<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1a1020"/><stop offset="100%" stop-color="#0a0510"/></linearGradient>
    <radialGradient id="purpleGlow"><stop offset="0%" stop-color="#9b59b6" stop-opacity="0.4"/><stop offset="100%" stop-color="#9b59b6" stop-opacity="0"/></radialGradient>
  </defs>
  <rect fill="url(#bg1)" width="800" height="400"/>
  <circle cx="400" cy="180" r="180" fill="url(#purpleGlow)"/>
  <!-- BOSS 轮廓 -->
  <g transform="translate(400,200)" fill="#2a1030" stroke="#9b59b6" stroke-width="2" opacity="0.9">
    <!-- 身体 -->
    <ellipse cx="0" cy="20" rx="60" ry="70"/>
    <!-- 头部 -->
    <circle cx="0" cy="-50" r="40"/>
    <!-- 角 -->
    <path d="M-25,-85 Q-30,-120 -15,-130 Q0,-140 5,-115" fill="#1a1020"/>
    <path d="M25,-85 Q30,-120 15,-130 Q0,-140 -5,-115" fill="#1a1020"/>
    <!-- 眼睛（发光） -->
    <circle cx="-15" cy="-55" r="8" fill="#e74c3c"/>
    <circle cx="15" cy="-55" r="8" fill="#e74c3c"/>
    <!-- 手臂 -->
    <path d="M-55,10 Q-90,0 -100,30"/>
    <path d="M55,10 Q90,0 100,30"/>
  </g>
  <!-- 玩家轮廓 -->
  <g transform="translate(200,300)" fill="#c9a84c" opacity="0.6">
    <circle cx="0" cy="-15" r="10"/>
    <rect x="-8" y="-5" width="16" height="25" rx="3"/>
    <line x1="5" y1="5" x2="25" y2="-10" stroke="#c9a84c" stroke-width="2"/>
    <circle cx="25" cy="-10" r="4" fill="#4fc3f7"/>
  </g>
  <text x="400" y="340" text-anchor="middle" fill="#9b59b6" font-size="16" opacity="0.5" font-family="Noto Sans SC">B O S S   B A T T L E</text>
</svg>
