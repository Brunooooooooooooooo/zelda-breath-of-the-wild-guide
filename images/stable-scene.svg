<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="stableSky" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1a2a5e"/><stop offset="50%" stop-color="#2d539e"/><stop offset="100%" stop-color="#e8c870"/></linearGradient>
    <linearGradient id="grass" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#5a8a3a"/><stop offset="100%" stop-color="#3a6020"/></linearGradient>
  </defs>
  <rect fill="url(#stableSky)" width="800" height="400"/>
  <!-- 月亮 -->
  <circle cx="650" cy="80" r="30" fill="#e8f0f8" opacity="0.8"/>
  <!-- 地面 -->
  <rect y="280" width="800" height="120" fill="url(#grass)"/>
  <!-- 驿站 -->
  <g transform="translate(300,200)">
    <rect x="0" y="0" width="200" height="120" fill="#8B7355" rx="4"/>
    <polygon points="-10,0 100,-60 210,0" fill="#A0522D"/>
    <!-- 窗户 -->
    <rect x="30" y="20" width="30" height="25" rx="3" fill="#ffcc00" opacity="0.6"/>
    <rect x="140" y="20" width="30" height="25" rx="3" fill="#ffcc00" opacity="0.6"/>
    <!-- 门 -->
    <rect x="85" y="45" width="30" height="55" rx="3" fill="#5a3a1a"/>
    <!-- 马头标志 -->
    <g transform="translate(100,-45)" fill="#c9a84c" opacity="0.8">
      <ellipse cx="0" cy="0" rx="8" ry="12"/>
      <ellipse cx="-12" cy="-8" rx="10" ry="6"/>
    </g>
    <!-- 马 -->
    <g transform="translate(550,240)" fill="#5a3020" opacity="0.8">
      <ellipse cx="0" cy="0" rx="25" ry="15"/>
      <ellipse cx="-20" cy="-12" rx="15" ry="10"/>
      <rect x="-15" y="-30" width="4" height="25"/>
      <rect x="-25" y="-15" width="20" height="4"/>
    </g>
  </g>
  <!-- 树 -->
  <g transform="translate(100,230)">
    <rect x="-3" y="0" width="6" height="50" fill="#4a3020"/>
    <circle cx="0" cy="-10" r="20" fill="#3a6020" opacity="0.7"/>
  </g>
  <text x="400" y="370" text-anchor="middle" fill="#c9a84c" font-size="14" opacity="0.4">S T A B L E</text>
</svg>
